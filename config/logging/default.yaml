# Default logging configuration (non-secret)

version: 1
level: info
format: json # json | pretty
redact_fields:
  - password
  - passwordHash
  - accessToken
  - refreshToken
  - authorization
  - clientSecret
  - apiKey
  - rawCardNumber
  - cvv
services:
  api:
    level: info
  worker:
    level: info
  ai:
    level: info
    # Full prompt bodies only when explicitly enabled in non-prod
    log_full_prompts: false
