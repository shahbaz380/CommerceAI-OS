# Local infrastructure dependencies for the API foundation
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commerceai
      POSTGRES_PASSWORD: commerceai
      POSTGRES_DB: commerceai_local
    ports:
      - "5432:5432"
    volumes:
      - commerceai_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerceai -d commerceai_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  commerceai_pg:
