# Production environment overlay (non-secret)
# Secrets injected via secret manager / env at runtime

app_env: production
log_level: info
log_format: json
tenancy_enforcement: true
database:
  ssl: true
  pool_min: 5
  pool_max: 50
feature_flag_source: remote # prefer dynamic flags in prod when available
require_mfa_for_admin: true
